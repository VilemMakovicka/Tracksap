{% block content %}
    {% if not current_user %}<script>window.location.href = "/login"</script>{% endif %}
<form action="/upload" enctype="multipart/form-data" method="POST">
    <input type="file" name="track_file" accept=".mp3" required>
    <input type="file" name="track_cover" accept=".jpg,.jpeg,.png" required>
    <input type="text" name="track_name" required>
    <input type="submit" value="Upload">
</form>
{% endblock %}
